<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Task Management App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:900px;
      background:#1e293b;
      border-radius:15px;
      padding:30px;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#38bdf8;
    }

    .task-form{
      display:flex;
      gap:10px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .task-form input{
      flex:1;
      padding:15px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .task-form button{
      padding:15px 25px;
      background:#38bdf8;
      border:none;
      border-radius:8px;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .task-form button:hover{
      background:#0284c7;
    }

    .task-list{
      display:grid;
      gap:20px;
    }

    .task{
      background:#334155;
      padding:20px;
      border-radius:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
    }

    .task.completed{
      opacity:0.6;
      text-decoration:line-through;
    }

    .task-info h3{
      margin-bottom:10px;
    }

    .task-buttons{
      display:flex;
      gap:10px;
    }

    .complete-btn{
      background:#22c55e;
    }

    .delete-btn{
      background:#ef4444;
    }

    .task-buttons button{
      border:none;
      padding:10px 15px;
      border-radius:8px;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .task-buttons button:hover{
      transform:scale(1.05);
    }

    .stats{
      margin-top:30px;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
    }

    .card{
      background:#0f172a;
      padding:20px;
      border-radius:10px;
      flex:1;
      text-align:center;
      min-width:150px;
    }

    .card h2{
      color:#38bdf8;
      margin-bottom:10px;
    }

    @media(max-width:768px){

      .task{
        flex-direction:column;
        align-items:flex-start;
      }

      .task-buttons{
        width:100%;
      }

      .task-buttons button{
        width:100%;
      }

      .task-form{
        flex-direction:column;
      }

      .task-form button{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Task Management Application</h1>

    <!-- TASK FORM -->

    <div class="task-form">

      <input
        type="text"
        id="taskInput"
        placeholder="Enter your task..."
      >

      <button onclick="addTask()">
        Add Task
      </button>

    </div>

    <!-- TASK LIST -->

    <div class="task-list" id="taskList"></div>

    <!-- STATS -->

    <div class="stats">

      <div class="card">
        <h2 id="totalTasks">0</h2>
        <p>Total Tasks</p>
      </div>

      <div class="card">
        <h2 id="completedTasks">0</h2>
        <p>Completed</p>
      </div>

      <div class="card">
        <h2 id="pendingTasks">0</h2>
        <p>Pending</p>
      </div>

    </div>

  </div>

  <script>

    let tasks = [];

    // ADD TASK

    function addTask(){

      const taskInput =
        document.getElementById("taskInput");

      const taskText = taskInput.value.trim();

      if(taskText === ""){
        alert("Please enter a task");
        return;
      }

      const task = {
        id: Date.now(),
        text: taskText,
        completed:false
      };

      tasks.push(task);

      taskInput.value = "";

      renderTasks();

    }

    // RENDER TASKS

    function renderTasks(){

      const taskList =
        document.getElementById("taskList");

      taskList.innerHTML = "";

      tasks.forEach(task => {

        const taskDiv =
          document.createElement("div");

        taskDiv.classList.add("task");

        if(task.completed){
          taskDiv.classList.add("completed");
        }

        taskDiv.innerHTML = `

          <div class="task-info">

            <h3>${task.text}</h3>

            <p>
              Status:
              ${
                task.completed
                ? "Completed"
                : "Pending"
              }
            </p>

          </div>

          <div class="task-buttons">

            <button
              class="complete-btn"
              onclick="toggleTask(${task.id})"
            >
              ${
                task.completed
                ? "Undo"
                : "Complete"
              }
            </button>

            <button
              class="delete-btn"
              onclick="deleteTask(${task.id})"
            >
              Delete
            </button>

          </div>

        `;

        taskList.appendChild(taskDiv);

      });

      updateStats();

    }

    // COMPLETE TASK

    function toggleTask(id){

      tasks = tasks.map(task => {

        if(task.id === id){

          return {
            ...task,
            completed: !task.completed
          };

        }

        return task;

      });

      renderTasks();

    }

    // DELETE TASK

    function deleteTask(id){

      tasks =
        tasks.filter(task => task.id !== id);

      renderTasks();

    }

    // UPDATE STATS

    function updateStats(){

      const total =
        tasks.length;

      const completed =
        tasks.filter(
          task => task.completed
        ).length;

      const pending =
        total - completed;

      document.getElementById(
        "totalTasks"
      ).innerText = total;

      document.getElementById(
        "completedTasks"
      ).innerText = completed;

      document.getElementById(
        "pendingTasks"
      ).innerText = pending;

    }

  </script>

</body>
</html>
